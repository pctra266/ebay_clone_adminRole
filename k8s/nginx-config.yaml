# ============================================================
# ConfigMap — Nginx Configuration
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ebay-clone
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          'Proxy-to: $upstream_addr';

        access_log  /var/log/nginx/access.log  main;

        sendfile        on;
        keepalive_timeout  65;

        # ── Load Balance Upstream — Chia tải cho 2 Pods API ──
        upstream backend_api {
            server ebay-api-service:80;
            # Mặc định là Round Robin
        }

        server {
            listen       80;
            server_name  localhost;

            # Health check cho Nginx
            location /nginx-health {
                access_log off;
                return 200 "healthy\n";
            }

            # Proxy toàn bộ request vào API
            location / {
                proxy_pass         http://backend_api;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade $http_upgrade;
                proxy_set_header   Connection keep-alive;
                proxy_set_header   Host $host;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   X-Real-IP $remote_addr;

                # Thêm header để quan sát xem request trúng Pod nào (để test)
                add_header X-Backend-Server $upstream_addr;
            }
        }
    }
