# ============================================================
# Secret — Lưu thông tin nhạy cảm (base64 encoded)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: ebay-secrets
  namespace: ebay-clone
type: Opaque
data:
  # 1. MẬT KHẨU MỒI: Bắt buộc theo policy của SQL Server (>= 8 ký tự, có HOA, thường, số, ký tự đặc biệt)
  # echo -n "StrongInitialPass123!" | base64
  # Dùng để khởi tạo SQL Server ban đầu, sau đó script sẽ đổi về mật khẩu thật 123456
  SA_PASSWORD_INITIAL: U3Ryb25nSW5pdGlhbFBhc3MxMjMh

  # 2. MẬT KHẨU THẬT: Giá trị thực tế ứng dụng sẽ dùng
  # Từ user: 123456 -> Base64: MTIzNDU2
  SA_PASSWORD_ACTUAL: MTIzNDU2

  # 3. JWT Key
  JWT_KEY: VEhJU19JU19TVVBFUl9TRUNSRVRfS0VZXzEyMzQ1Njc4OV9BQkM=

