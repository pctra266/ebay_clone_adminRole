# ============================================================
# Service — Nginx Entry Point
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: ebay-nginx-service
  namespace: ebay-clone
spec:
  type: LoadBalancer # Trên Docker Desktop sẽ map thẳng localhost:80
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: ebay-nginx
