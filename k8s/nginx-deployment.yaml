# ============================================================
# Deployment — Nginx Proxy
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebay-nginx
  namespace: ebay-clone
  labels:
    app: ebay-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ebay-nginx
  template:
    metadata:
      labels:
        app: ebay-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config
